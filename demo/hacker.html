<!DOCTYPE html>
<html>
<head>
  <title>SmartField — Hacker Challenge</title>
  <script src="../component/smartfield.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Fira Code',monospace;background:#0a0a0a;color:#e2e8f0;padding:20px}
    h1{color:#ef4444;font-size:24px;margin-bottom:4px}
    .sub{color:#666;font-size:12px;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .target{background:#111;border:1px solid #222;border-radius:12px;padding:20px}
    .target h2{font-size:14px;color:#00B88A;margin-bottom:12px}
    .target label{display:block;font-size:11px;color:#555;margin-bottom:4px;text-transform:uppercase}
    .target smart-field{margin-bottom:10px;--sf-bg:#0a0a0a;--sf-border-color:#333;--sf-cipher-color:#00B88A;--sf-focus-color:#00B88A}
    .results{background:#0a0a0a;border:1px solid #222;border-radius:12px;padding:20px;max-height:80vh;overflow-y:auto}
    .results h2{font-size:14px;color:#ef4444;margin-bottom:12px}
    #log{font-size:11px;line-height:2}
    .pass{color:#00B88A}.fail{color:#ef4444}.info{color:#3b82f6}.warn{color:#f59e0b}.dim{color:#333}
    .run-btn{display:block;width:100%;padding:14px;background:#ef4444;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;font-family:monospace;transition:all 0.15s}
    .run-btn:hover{background:#dc2626}
    .run-btn:disabled{opacity:0.5;cursor:not-allowed}
    .score{text-align:center;padding:20px;margin-top:16px;border-radius:12px;font-size:32px;font-weight:800}
    .counter{font-family:monospace;font-size:13px;color:#666;margin-top:8px;text-align:right}
  </style>
</head>
<body>

<h1>SmartField Hacker Challenge</h1>
<p class="sub">Type something in the fields below, then click "Run All Attacks" to try to steal it.</p>
<div style="background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
  <span style="font-size:20px">💻</span>
  <span style="font-size:12px;color:#00B88A">Press <kbd style="background:#333;padding:2px 8px;border-radius:4px;color:#fff;font-weight:700">F12</kbd> to open DevTools Console — watch the attacks in real-time there too</span>
</div>

<div class="grid">
  <div class="target">
    <h2>Target: SmartField</h2>
    <label>Credit Card</label>
    <smart-field sf-type="card" id="sf-card"></smart-field>
    <label>Password</label>
    <smart-field type="password" id="sf-pwd"></smart-field>
    <label>SSN</label>
    <smart-field sf-type="ssn" id="sf-ssn"></smart-field>
    <button class="run-btn" id="run-btn" onclick="runAllAttacks()">Run All Attacks — 20 Vectors</button>
    <div id="legend" style="display:none;margin-top:16px;background:#111;border:1px solid #222;border-radius:10px;padding:14px;font-size:11px;line-height:2">
      <div style="color:#666;margin-bottom:6px;font-weight:700;font-size:11px">What each attack does in the real world:</div>
      <div id="legend-items"></div>
    </div>
  </div>

  <div class="results">
    <h2>Attack Results</h2>
    <div class="counter" id="counter"></div>
    <div id="log"></div>
    <div id="score-box"></div>
  </div>
</div>

<script>
var L = document.getElementById('log');
var blocked = 0, total = 0;
var attacks = [];

function hlog(t, c) {
  var d = document.createElement('div');
  d.className = c || 'dim';
  d.textContent = t;
  d.style.opacity = '0';
  d.style.transform = 'translateX(-10px)';
  d.style.transition = 'all 0.2s ease-out';
  L.appendChild(d);
  // Animate in
  setTimeout(function() { d.style.opacity = '1'; d.style.transform = 'translateX(0)'; }, 20);
  L.scrollTop = L.scrollHeight;
}

function runAllAttacks() {
  // Disable button
  var btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = 'Attacking...';

  L.innerHTML = '';
  blocked = 0; total = 0; attacks = [];
  document.getElementById('score-box').innerHTML = '';
  document.getElementById('counter').textContent = '';

  var sf = document.getElementById('sf-pwd');

  document.getElementById('legend').style.display = 'block';
  document.getElementById('legend-items').innerHTML = '';

  // Queue all attacks with real-world explanation
  function q(name, fn, explain) {
    attacks.push({ name: name, fn: fn, explain: explain });
  }

  q('Read .value directly', function() {
    var v = sf.value;
    if (v && v.length < 100 && !v.startsWith('eyJ')) return { stolen: true, data: v };
    return { stolen: false, reason: '.value returns encrypted: "' + (v||'').substring(0,30) + '..."' };
  }, 'How hackers steal passwords from normal inputs');

  q('Access shadowRoot', function() {
    if (sf.shadowRoot) return { stolen: true, data: 'shadowRoot accessible!' };
    return { stolen: false, reason: 'shadowRoot = null (CLOSED)' };
  }, 'How they access open Web Components');

  q('Read innerHTML', function() {
    var h = sf.innerHTML;
    if (h && h.length > 0) return { stolen: true, data: h };
    return { stolen: false, reason: 'innerHTML = "" (empty)' };
  }, 'How they read DOM content');

  q('Read textContent', function() {
    var t = sf.textContent;
    if (t && t.length > 0) return { stolen: true, data: t };
    return { stolen: false, reason: 'textContent = "" (empty)' };
  }, 'Another way to extract text from elements');

  q('Read innerText', function() {
    var t = sf.innerText;
    if (t && t.length > 0) return { stolen: true, data: t };
    return { stolen: false, reason: 'innerText = "" (empty)' };
  }, 'Third method to read visible text');

  q('querySelector("input")', function() {
    var input = sf.querySelector('input');
    if (input) return { stolen: true, data: 'Found: ' + input.value };
    return { stolen: false, reason: 'querySelector returns null' };
  }, 'How bots find and fill input fields');

  q('querySelectorAll("*")', function() {
    var all = sf.querySelectorAll('*');
    if (all.length > 0) return { stolen: true, data: all.length + ' elements' };
    return { stolen: false, reason: '0 elements found' };
  }, 'How scrapers enumerate all child elements');

  q('Access children / childNodes', function() {
    if (sf.children.length > 0) return { stolen: true, data: sf.children.length + ' children' };
    return { stolen: false, reason: 'No accessible children' };
  }, 'Direct DOM tree traversal attack');

  q('Read outerHTML for data', function() {
    var h = sf.outerHTML;
    if (h.indexOf('value=') > -1 && h.indexOf('encrypted') === -1) return { stolen: true, data: h.substring(0, 80) };
    return { stolen: false, reason: 'No plaintext in outerHTML' };
  }, 'How they extract HTML including attribute values');

  q('Read field metadata (type, name, length)', function() {
    if (sf.type === 'password' || sf.type === 'text') return { stolen: true, data: 'type=' + sf.type };
    if (sf.length > 0) return { stolen: true, data: 'length=' + sf.length };
    return { stolen: false, reason: 'type="' + sf.type + '", name="' + sf.name + '", length=' + sf.length };
  }, 'How they identify what kind of field it is');

  q('Inject value (.value = "HACKED")', function() {
    try { sf.value = 'HACKED'; } catch(e) {}
    var v = sf.value;
    if (v === 'HACKED') return { stolen: true, data: 'Value was injected!' };
    return { stolen: false, reason: '.value setter is blocked' };
  }, 'How they inject malicious data into forms');

  q('Add keydown event listener', function() {
    var captured = [];
    sf.addEventListener('keydown', function(e) { captured.push(e.key); });
    if (captured.length > 0) return { stolen: true, data: captured.join('') };
    return { stolen: false, reason: 'Events don\'t propagate outside Shadow DOM' };
  }, 'How keyloggers capture every keystroke');

  q('Prototype pollution (Object.defineProperty)', function() {
    try {
      Object.defineProperty(sf, 'value', { get: function() { return 'hacked'; }, configurable: true });
      var v = sf.value;
      if (v === 'hacked') return { stolen: true, data: v };
    } catch(e) {
      return { stolen: false, reason: 'Cannot redefine .value (configurable: false)' };
    }
    return { stolen: false, reason: 'Prototype override returns encrypted' };
  }, 'Advanced attack that redefines object properties');

  q('MutationObserver', function() {
    var changes = [];
    var obs = new MutationObserver(function(m) { changes.push(m); });
    obs.observe(sf, { attributes: true, childList: true, subtree: true });
    if (changes.length > 0) return { stolen: true, data: changes.length + ' mutations' };
    return { stolen: false, reason: 'Cannot observe closed Shadow DOM' };
  }, 'How Hotjar and FullStory watch DOM changes');

  q('getComputedStyle content', function() {
    var s = getComputedStyle(sf);
    var c = s.getPropertyValue('content');
    if (c && c !== 'none' && c !== 'normal') return { stolen: true, data: c };
    return { stolen: false, reason: 'CSS reveals nothing' };
  }, 'How they extract data hidden in CSS');

  q('Transparent input overlay', function() {
    var fake = document.createElement('input');
    fake.style.cssText = 'position:absolute;opacity:0.01;z-index:9999';
    document.body.appendChild(fake);
    var v = fake.value;
    document.body.removeChild(fake);
    if (v.length > 0) return { stolen: true, data: v };
    return { stolen: false, reason: 'Overlay captures nothing' };
  }, 'Invisible input placed on top to intercept typing');

  q('document.execCommand copy', function() {
    sf.focus && sf.focus();
    document.execCommand('selectAll');
    document.execCommand('copy');
    return { stolen: false, reason: 'execCommand blocked by Shadow DOM' };
  }, 'How they steal data from the clipboard');

  q('JSON.stringify(element)', function() {
    var j = JSON.stringify(sf);
    if (j.indexOf('realValue') > -1 || j.indexOf('password') > -1) return { stolen: true, data: j.substring(0, 80) };
    return { stolen: false, reason: 'Sensitive data in WeakMap (invisible)' };
  }, 'How they serialize objects to exfiltrate data');

  q('Enumerate all properties', function() {
    var found = [];
    var props = Object.getOwnPropertyNames(sf);
    for (var i = 0; i < props.length; i++) {
      try {
        var val = sf[props[i]];
        if (typeof val === 'string' && val.length > 0 && val.length < 50 && props[i] !== 'type' && props[i] !== 'tagName' && props[i] !== 'nodeName') {
          found.push(props[i]);
        }
      } catch(e) {}
    }
    if (found.length > 0) return { stolen: true, data: found.join(', ') };
    return { stolen: false, reason: 'No plaintext in any property' };
  }, 'How they scan every property looking for data');

  q('Accessibility APIs (ARIA)', function() {
    var v = sf.getAttribute('aria-valuenow') || sf.getAttribute('aria-valuetext');
    if (v) return { stolen: true, data: v };
    return { stolen: false, reason: 'No data in ARIA attributes' };
  }, 'How they read data from accessibility attributes');

  // Console output with colors
  console.clear();
  console.log('%c SmartField Hacker Challenge ', 'background:#ef4444;color:white;font-size:16px;font-weight:bold;padding:8px 16px;border-radius:4px');
  console.log('%cTarget: SmartField password field', 'color:#60a5fa;font-size:12px');
  console.log('');

  // Run one by one with delay
  hlog('=== AUTOMATED HACK ATTEMPT ===', 'warn');
  hlog('Target: SmartField password field', 'info');

  var idx = 0;
  function runNext() {
    if (idx >= attacks.length) {
      // Final result
      hlog('', 'dim');
      hlog('════════════════════════════════', 'warn');
      hlog('RESULT: ' + blocked + '/' + total + ' attacks BLOCKED', blocked === total ? 'pass' : 'fail');
      hlog('════════════════════════════════', 'warn');

      // Console final
      console.log('');
      if (blocked === total) {
        console.log('%c 🛡 UNBREAKABLE — ' + total + '/' + total + ' attacks blocked ', 'background:#00B88A;color:#000;font-size:18px;font-weight:bold;padding:8px 16px;border-radius:4px');
      } else {
        console.log('%c ⚠ VULNERABLE — ' + blocked + '/' + total + ' attacks blocked ', 'background:#ef4444;color:white;font-size:18px;font-weight:bold;padding:8px 16px;border-radius:4px');
      }

      var box = document.getElementById('score-box');
      if (blocked === total) {
        box.innerHTML = '<div class="score" style="background:#052e16;color:#00B88A">UNBREAKABLE<br><span style="font-size:14px">' + total + '/' + total + ' attacks blocked</span></div>' +
        '<div style="margin-top:16px;padding:16px;background:#0a0a0a;border:1px solid #222;border-radius:10px;text-align:center;font-size:13px;line-height:1.8">' +
          '<span style="color:#ef4444;font-weight:700">No Russian attack.</span><br>' +
          '<span style="color:#ef4444;font-weight:700">No North Korean attack.</span><br>' +
          '<span style="color:#ef4444;font-weight:700">No state-sponsored hack.</span><br>' +
          '<span style="color:#ef4444;font-weight:700">No zero-day exploit.</span><br>' +
          '<span style="color:#666;font-size:11px;margin-top:4px;display:inline-block">If it can\'t read the data, it can\'t steal the data. Period.</span>' +
        '</div>' +
        '';
      } else {
        box.innerHTML = '<div class="score" style="background:#450a0a;color:#ef4444">VULNERABLE<br><span style="font-size:14px">' + (total - blocked) + ' attacks succeeded</span></div>';
      }

      btn.disabled = false;
      btn.textContent = 'Run All Attacks — 20 Vectors';
      return;
    }

    var atk = attacks[idx];
    total++;
    hlog('', 'dim');
    hlog('ATTACK #' + total + ': ' + atk.name, 'info');

    // Small delay before showing result
    setTimeout(function() {
      try {
        var result = atk.fn();
        if (result.stolen) {
          hlog('  ✗ STOLEN: "' + result.data + '"', 'fail');
          console.log('%c ATTACK #' + total + ': ' + atk.name + ' %c ✗ STOLEN: "' + result.data + '"', 'color:#60a5fa;font-weight:bold', 'color:#ef4444;font-weight:bold');
        } else {
          hlog('  ✓ BLOCKED: ' + result.reason, 'pass');
          blocked++;
          console.log('%c ATTACK #' + total + ': ' + atk.name + ' %c ✓ BLOCKED', 'color:#60a5fa;font-weight:bold', 'color:#00B88A;font-weight:bold');
        }
      } catch(e) {
        hlog('  ✓ BLOCKED: ' + e.message, 'pass');
        blocked++;
        console.log('%c ATTACK #' + total + ': ' + atk.name + ' %c ✓ BLOCKED', 'color:#60a5fa;font-weight:bold', 'color:#00B88A;font-weight:bold');
      }

      document.getElementById('counter').textContent = blocked + '/' + total + ' blocked';

      // Add explanation to legend
      if (atk.explain) {
        var li = document.createElement('div');
        li.style.opacity = '0';
        li.style.transform = 'translateX(-10px)';
        li.style.transition = 'all 0.2s ease-out';
        li.innerHTML = '<span style="color:#ef4444;font-weight:700">#' + total + '</span> <span style="color:#888">' + atk.name + '</span> <span style="color:#555">→ ' + atk.explain + '</span>';
        document.getElementById('legend-items').appendChild(li);
        setTimeout(function() { li.style.opacity = '1'; li.style.transform = 'translateX(0)'; }, 20);
      }

      idx++;
      setTimeout(runNext, 200);
    }, 100);
  }

  setTimeout(runNext, 600);
}
</script>
</body>
</html>
