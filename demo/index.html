<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartField Demo</title>
  <script src="../component/smartfield.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      background: linear-gradient(135deg, #22c55e, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 40px;
    }

    .grid {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
    }

    .card {
      flex: 1;
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #334155;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      margin-left: 8px;
      vertical-align: middle;
    }

    .badge-red { background: #ef4444; color: white; }
    .badge-green { background: #22c55e; color: white; }

    .desc {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    /* Normal inputs only */
    .normal-input {
      display: block;
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid #334155;
      border-radius: 10px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }

    .normal-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .btn {
      display: block;
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-red { background: #dc2626; color: white; }
    .btn-green { background: #22c55e; color: white; }

    /* SmartField custom styling */
    smart-field {
      --sf-bg: #0f172a;
      --sf-border-color: #334155;
      --sf-radius: 10px;
      --sf-focus-color: #22c55e;
      --sf-focus-ring: rgba(34,197,94,0.2);
      --sf-placeholder-color: #4b5563;
      --sf-cipher-color: #22c55e;
    }

    /* Console */
    .console {
      max-width: 900px;
      margin: 24px auto 0;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 20px;
    }

    .console h3 {
      color: #f97316;
      font-size: 14px;
      font-family: monospace;
      margin-bottom: 12px;
    }

    #log {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.8;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-error { color: #ef4444; }
    .log-success { color: #22c55e; }
    .log-warn { color: #f59e0b; }
    .log-info { color: #60a5fa; }
    .log-dim { color: #334155; }

    .hack-btn {
      margin-top: 12px;
      padding: 10px 20px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <!-- Simulate trackers (fake scripts to trigger SmartField scanner) -->
  <script src="https://www.googletagmanager.com/gtag/js?id=FAKE"></script>
  <script src="https://static.hotjar.com/c/hotjar-000000.js"></script>
  <script src="https://connect.facebook.net/en_US/fbevents.js"></script>

  <h1>SmartField</h1>
  <p class="subtitle">Same form. One vulnerable, one encrypted. Type in both.</p>

  <div class="grid">

    <!-- VULNERABLE -->
    <div class="card">
      <div class="card-title">Normal &lt;input&gt; <span class="badge badge-red">VULNERABLE</span></div>
      <p class="desc">Standard HTML. Any script reads what you type.</p>

      <div class="field">
        <label>Email</label>
        <input class="normal-input" type="email" id="n-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input class="normal-input" type="password" id="n-pwd" placeholder="your password">
      </div>
      <button class="btn btn-red" onclick="testNormal()">Log In</button>
    </div>

    <!-- ENCRYPTED -->
    <div class="card">
      <div class="card-title">&lt;smart-field&gt; <span class="badge badge-green">ENCRYPTED</span></div>
      <p class="desc">SmartField. Encrypted, isolated, invisible to JavaScript.</p>

      <div class="field">
        <label>Email</label>
        <smart-field type="email" name="email" placeholder="type here..."></smart-field>
      </div>
      <div class="field">
        <label>Password</label>
        <smart-field type="password" name="password" placeholder="type here..."></smart-field>
      </div>
      <button class="btn btn-green" onclick="testSmart()">Log In</button>
    </div>

  </div>

  <!-- Console -->
  <div class="console">
    <h3>> What can a hacker see?</h3>
    <div id="log"></div>
    <button class="hack-btn" onclick="hackAttempt()">Simulate Attack</button>
  </div>

  <script>
    var logEl = document.getElementById('log');

    function log(text, type) {
      var d = document.createElement('div');
      d.className = 'log-' + (type || 'dim');
      d.textContent = '> ' + text;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Monitor normal inputs
    document.getElementById('n-email').addEventListener('input', function(e) {
      log('Normal email: "' + e.target.value + '"', 'error');
    });
    document.getElementById('n-pwd').addEventListener('input', function(e) {
      log('Normal password: "' + e.target.value + '"  EXPOSED!', 'error');
    });

    // Monitor SmartFields
    document.querySelectorAll('smart-field').forEach(function(sf) {
      sf.addEventListener('sf-input', function(e) {
        log('SmartField [' + e.detail.name + ']: length=' + e.detail.length + ' encrypted=' + (e.detail.encrypted || '').substring(0, 40) + '...', 'success');
      });
    });

    function testNormal() {
      log('--- FORM SUBMIT (normal) ---', 'warn');
      log('email: "' + document.getElementById('n-email').value + '"', 'error');
      log('password: "' + document.getElementById('n-pwd').value + '"  STOLEN!', 'error');
    }

    function testSmart() {
      log('--- FORM SUBMIT (SmartField) ---', 'info');
      document.querySelectorAll('smart-field').forEach(function(sf) {
        var v = sf.value;
        log(sf.name + ': "' + (v ? v.substring(0, 50) + '...' : '(empty)') + '"', 'success');
      });
      log('Only encrypted data. Server decrypts with private key.', 'success');
    }

    function hackAttempt() {
      log('', 'dim');
      log('=== ATTACK SIMULATION ===', 'warn');

      // Steal normal password
      log('Attack 1: Read .value', 'info');
      var pwd = document.getElementById('n-pwd').value;
      log('  Normal: "' + (pwd || '(empty)') + '"' + (pwd ? '  STOLEN!' : ''), pwd ? 'error' : 'dim');
      var sf = document.querySelector('smart-field[name="password"]');
      var sv = sf.value;
      log('  SmartField: "' + (sv ? sv.substring(0, 40) + '...' : '(empty)') + '"', 'success');
      if (sv) log('  ^ encrypted gibberish only', 'success');

      // Shadow DOM
      log('Attack 2: Access shadowRoot', 'info');
      log('  shadowRoot = ' + sf.shadowRoot + '  (CLOSED)', 'success');

      // innerHTML
      log('Attack 3: Read innerHTML', 'info');
      log('  innerHTML: "' + sf.innerHTML + '"  (empty)', 'success');
      log('  textContent: "' + sf.textContent + '"  (empty)', 'success');

      // querySelector
      log('Attack 4: querySelector("input")', 'info');
      log('  result: ' + sf.querySelector('input') + '  (blocked)', 'success');

      log('', 'dim');
      log('Normal: HACKED | SmartField: PROTECTED', 'warn');
    }

    log('Type in both forms to see the difference...', 'dim');
  </script>
</body>
</html>
