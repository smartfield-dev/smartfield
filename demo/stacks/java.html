<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartField + Java</title>
<script src="/component/smartfield.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #1a0a0a 0%, #280d0d 50%, #140a0a 100%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem;
  }
  .accent { color: #fc8181; }
  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(252, 129, 129, 0.2);
  }
  header h1 { font-size: 2rem; font-weight: 700; }
  header .port-badge {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.25rem 0.75rem;
    background: rgba(252, 129, 129, 0.15);
    border: 1px solid rgba(252, 129, 129, 0.3);
    border-radius: 999px;
    font-size: 0.85rem;
    color: #fc8181;
  }
  section { margin-bottom: 2rem; }
  section h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #fc8181;
  }
  .modes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  .mode-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .mode-card h3 {
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
    color: #fc8181;
  }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: #a0aec0;
    margin-bottom: 0.35rem;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 0.75rem;
  }
  .input-wrap input {
    width: 100%;
    padding: 0.6rem 2.5rem 0.6rem 0.75rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: #fc8181; }
  .eye-btn {
    position: relative;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #a0aec0;
    padding: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
  }
  .eye-btn:hover { color: #fc8181; }
  smart-field { display: block; margin-bottom: 0.75rem; }
  .submit-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1rem;
    padding: 0.7rem 1.75rem;
    background: #fc8181;
    color: #0a0a0a;
    font-weight: 600;
    font-size: 0.95rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.85; }
  #result {
    margin-top: 1.5rem;
    padding: 1.25rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    white-space: pre-wrap;
    display: none;
    line-height: 1.6;
  }
  .back-link {
    display: inline-block;
    margin-top: 2rem;
    color: #fc8181;
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back-link:hover { text-decoration: underline; }
  @media (max-width: 768px) {
    .modes { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Smart<span class="accent">Field</span> + Java</h1>
  <div class="port-badge">localhost:6666</div>
</header>

<section>
  <h2>Security Modes</h2>
  <div class="modes">
    <div class="mode-card">
      <h3>Standard</h3>
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="stdPassword" placeholder="Type a password..." autocomplete="off">
        <button class="eye-btn" type="button" onclick="toggleEye(this, 'stdPassword')">
          <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.0 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.45 18.45 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>
        </button>
      </div>
    </div>
    <div class="mode-card">
      <h3>Max</h3>
      <label>Secret</label>
      <smart-field name="sf_max" placeholder="Fully masked..." sf-security="max" encrypt-key="/proxy/java/sf-key"></smart-field>
    </div>
    <div class="mode-card">
      <h3>Peek</h3>
      <label>Secret</label>
      <smart-field name="sf_peek" placeholder="Hold to reveal..." sf-security="peek" encrypt-key="/proxy/java/sf-key"></smart-field>
    </div>
    <div class="mode-card">
      <h3>Brief</h3>
      <label>Secret</label>
      <smart-field name="sf_brief" placeholder="Flash then hide..." sf-security="brief" encrypt-key="/proxy/java/sf-key"></smart-field>
    </div>
  </div>
  <button class="submit-btn" onclick="submitForm()">Submit to Java</button>
  <div id="result"></div>
</section>

<a href="/demo/stacks/" class="back-link">&larr; Back to demos</a>

<script>
function toggleEye(btn, inputId) {
  const input = document.getElementById(inputId);
  const open = btn.querySelector('.eye-open');
  const closed = btn.querySelector('.eye-closed');
  if (input.type === 'password') {
    input.type = 'text';
    open.style.display = 'none';
    closed.style.display = 'block';
  } else {
    input.type = 'password';
    open.style.display = 'block';
    closed.style.display = 'none';
  }
}

async function submitForm() {
  const fields = document.querySelectorAll('smart-field');
  const body = {};
  fields.forEach(f => {
    if (f.name) body[f.name] = f.value;
  });
  const stdPassword = document.getElementById('stdPassword');
  body.standard_password = stdPassword.value;

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.textContent = 'Sending...';

  try {
    const res = await fetch('/proxy/java/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    resultEl.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    resultEl.textContent = 'Error: ' + err.message;
  }
}
</script>
</body>
</html>
