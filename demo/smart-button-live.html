<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartButton — Live Component Test</title>
<script src="/component/smartfield.js" data-key="sf_test_765d7b744742dd8c0ebc6c8313d53e15"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0f1c;
    color: #e2e8f0;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 32px;
  }
  h1 { font-size: 28px; font-weight: 800; }
  h1 span { color: #22c55e; }
  .subtitle { color: #64748b; font-size: 13px; }
  .forms { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 800px; width: 100%; position: relative; }
  .card {
    background: #111827;
    border-radius: 16px;
    padding: 28px;
  }
  .card-safe { border: 2px solid #22c55e; }
  .card-fake { border: 2px solid #ef4444; }
  .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 12px; }
  .tag-safe { background: rgba(34,197,94,0.15); color: #22c55e; }
  .tag-fake { background: rgba(239,68,68,0.15); color: #ef4444; }
  h3 { font-size: 16px; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .vs { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 32px; height: 32px; background: #0a0f1c; border: 2px solid #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #64748b; z-index: 2; }
  .result { margin-top: 16px; padding: 12px; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 11px; line-height: 1.6; display: none; }
  .result-ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; }
  .result-bad { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }
</style>
</head>
<body>

<div>
  <h1>&lt;smart-button&gt; <span>Live Test</span></h1>
  <p class="subtitle">Real component — type data and click the button</p>
</div>

<div class="forms">
  <!-- LEGITIMATE -->
  <div class="card card-safe">
    <span class="tag tag-safe">LEGITIMATE</span>
    <h3>banco.com (real)</h3>
    <form id="form-ok" onsubmit="return false">
      <div class="field">
        <label>Email</label>
        <smart-field sf-security="brief" sf-domain="localhost" type="email" placeholder="email" encrypt-key="/api/public-key"></smart-field>
      </div>
      <div class="field">
        <label>Password</label>
        <smart-field sf-security="brief" sf-domain="localhost" type="password" placeholder="password" encrypt-key="/api/public-key"></smart-field>
      </div>
      <smart-button label="Pay $99.00">Pay $99.00</smart-button>
    </form>
    <div class="result result-ok" id="res-ok"></div>
  </div>

  <div class="vs">VS</div>

  <!-- PHISHING -->
  <div class="card card-fake">
    <span class="tag tag-fake">PHISHING</span>
    <h3>banc0.com (fake)</h3>
    <form id="form-bad" onsubmit="return false">
      <div class="field">
        <label>Email</label>
        <smart-field sf-security="brief" sf-domain="banco.com" type="email" placeholder="email" encrypt-key="/api/public-key"></smart-field>
      </div>
      <div class="field">
        <label>Password</label>
        <smart-field sf-security="brief" sf-domain="banco.com" type="password" placeholder="password" encrypt-key="/api/public-key"></smart-field>
      </div>
      <smart-button label="Pay $99.00">Pay $99.00</smart-button>
    </form>
    <div class="result result-bad" id="res-bad"></div>
  </div>
</div>

<script>
var API = location.origin;

document.addEventListener('sf-submit', async function(e) {
  var form = e.target.closest('form');
  if (!form) return;

  var fields = [];
  form.querySelectorAll('input[type="hidden"][data-sf-id]').forEach(function(h) {
    fields.push({ id: h.name, encrypted: h.value });
  });

  if (fields.length === 0) return;

  var res = await fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: fields })
  }).then(function(r) { return r.json(); });

  if (form.id === 'form-ok') {
    var el = document.getElementById('res-ok');
    el.style.display = 'block';
    el.textContent = 'Server decrypted: ' + JSON.stringify(res.decrypted, null, 2);
  } else {
    var el2 = document.getElementById('res-bad');
    el2.style.display = 'block';
    el2.textContent = 'Hacker got: ' + JSON.stringify(res.decrypted, null, 2) + '\n\nALL FAKE — real data never sent.';
  }
});
</script>

</body>
</html>
